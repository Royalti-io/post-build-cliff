name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - name: Verify expected pages built
        run: |
          test -f dist/index.html
          test -f dist/01-the-cliff/overview/index.html
          test -f dist/02-minimum-competence/overview/index.html
          test -f dist/03-hiring-line/overview/index.html
          test -d dist/pagefind
          echo "All expected build artefacts present."
